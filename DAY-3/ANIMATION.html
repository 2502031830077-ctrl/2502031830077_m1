<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        @keyframes slideIn {
  from {
    transform: translateX(-100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }
        main {
            flex: 1;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin: 0;
        }
        .animation-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .animated-box {
            width: 200px;
            height: 200px;
            background-color: #007BFF;
            animation: slideIn 2s ease-out infinite alternate;
            position: relative;
            border-radius: 16px;
        }
        footer {
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ccc;
            margin-top: auto;
        }
         @media (max-width: 768px) {
            header, footer {
                padding: 15px;
            }
            main {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Simple CSS Animation</h1>
        <p>Watch the blue box slide in from the left.</p>
    </header>
    <main>
        <div class="animation-container">
            <div class="animated-box"></div>
            <p>This box is animated using the <code>@keyframes</code> rule and the <code>animation</code> property.</p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Animation Demo</p>
    </footer>
</body>
</html>
