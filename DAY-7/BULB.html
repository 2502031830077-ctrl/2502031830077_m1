<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Gun Fire</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0d17 100%);
            color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .wrapper {
            text-align: center;
            padding: 24px;
            width: 50vw;
            max-width: 50vw;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0;
            background: rgba(255,255,255,0.04);
            box-shadow: none;
            margin: 0;
        }
        #stickman {
            width: 100%;
            max-width: 100vw;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        #stickman:hover {
            transform: scale(1.03);
        }
        p {
            margin: 14px 0 0;
            font-size: 1rem;
            line-height: 1.5;
            color: #dfe4ea;
        }
        .hint {
            color: #99a2b2;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <svg id="stickman" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
            <defs>
                <linearGradient id="headGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffd7ae" />
                    <stop offset="100%" stop-color="#e0a87a" />
                </linearGradient>
                <linearGradient id="flashGradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff" />
                    <stop offset="100%" stop-color="#ff8a00" stop-opacity="0" />
                </linearGradient>
            </defs>
            <rect x="0" y="170" width="420" height="110" fill="#173f27" />
            <path d="M0 170 Q100 150 200 170 T380 170 L420 170 L420 280 L0 280 Z" fill="#255b3c" opacity="0.8" />
            <g id="clouds" fill="#ffffff" opacity="0.25">
                <ellipse cx="70" cy="50" rx="40" ry="18" />
                <ellipse cx="130" cy="40" rx="30" ry="16" />
                <ellipse cx="230" cy="55" rx="45" ry="20" />
                <ellipse cx="310" cy="45" rx="35" ry="15" />
            </g>
            <g id="target" opacity="0.95">
                <circle cx="360" cy="118" r="40" fill="#ff4040" />
                <circle id="target-inner-1" cx="360" cy="118" r="24" fill="#ffffff" />
                <circle id="target-inner-2" cx="360" cy="118" r="10" fill="#ff4040" />
                <line x1="360" y1="138" x2="360" y2="260" stroke="#fff" stroke-width="4" />
            </g>
            <g id="stick-body" stroke="#111" stroke-width="10" stroke-linecap="round">
                <circle cx="140" cy="70" r="28" fill="url(#headGradient)" stroke-width="5" />
                <line x1="140" y1="98" x2="140" y2="172" />
                <line x1="140" y1="110" x2="90" y2="155" />
                <line x1="140" y1="110" x2="190" y2="155" />
                <line x1="140" y1="172" x2="120" y2="238" />
                <line x1="140" y1="172" x2="170" y2="238" />
            </g>
            <g id="machine-gun" fill="#3a3a3a" stroke="#111" stroke-width="8" stroke-linejoin="round">
                <rect x="70" y="130" width="110" height="18" rx="6" ry="6" />
                <rect x="178" y="128" width="80" height="16" rx="6" ry="6" />
                <rect x="60" y="148" width="18" height="45" rx="4" ry="4" />
                <rect x="88" y="122" width="36" height="20" rx="5" ry="5" fill="#262626" />
                <path d="M175 132 L230 125 L300 108" stroke="#111" stroke-width="10" stroke-linecap="round" fill="none" />
                <path d="M200 142 L260 132 L325 116" stroke="#111" stroke-width="10" stroke-linecap="round" fill="none" />
                <path d="M73 175 L45 175" stroke="#111" stroke-width="10" stroke-linecap="round" />
            </g>
            <g id="belt" fill="#222">
                <rect x="145" y="142" width="20" height="10" rx="4" ry="4" />
                <rect x="145" y="156" width="20" height="10" rx="4" ry="4" />
                <rect x="145" y="170" width="20" height="10" rx="4" ry="4" />
                <rect x="145" y="184" width="20" height="10" rx="4" ry="4" />
            </g>
            <g id="muzzle-flash" opacity="0">
                <circle cx="325" cy="116" r="18" fill="url(#flashGradient)" />
                <path d="M315 110 L340 100 L335 120 Z" fill="#ffd700" />
            </g>
            <circle id="bullet" cx="300" cy="118" r="6" fill="#ffdc00" opacity="0" />
            <circle cx="128" cy="62" r="5" fill="#111" />
            <circle cx="152" cy="62" r="5" fill="#111" />
            <path d="M124 80 Q140 92 156 80" stroke="#111" stroke-width="6" fill="none" stroke-linecap="round" />
        </svg>
        <p>Click the stickman to start/stop continuous machine-gun fire.</p>
    </div>
    <script>
        var stickman = document.getElementById("stickman");
        var bullet = document.getElementById("bullet");
        var flash = document.getElementById("muzzle-flash");
        var targetInner1 = document.getElementById("target-inner-1");
        var targetInner2 = document.getElementById("target-inner-2");
        var firing = false;
        var fireTimer = null;

        function shootBullet() {
            var offset = Math.floor(Math.random() * 51) - 25;
            var startY = 118 + offset;
            var hit = Math.abs(offset) <= 18;
            bullet.setAttribute("opacity", "1");
            bullet.setAttribute("cx", "300");
            bullet.setAttribute("cy", startY);
            var position = 300;
            var targetProcessed = false;

            var interval = setInterval(function() {
                position += 10;
                bullet.setAttribute("cx", position);
                if (position >= 340 && !targetProcessed) {
                    targetProcessed = true;
                    if (hit) {
                        targetInner1.setAttribute("fill", "#8cff86");
                        targetInner2.setAttribute("fill", "#22bb33");
                    } else {
                        targetInner1.setAttribute("fill", "#ffffff");
                        targetInner2.setAttribute("fill", "#ff4040");
                    }
                }
                if (position >= 360) {
                    clearInterval(interval);
                    bullet.setAttribute("opacity", "0");
                    setTimeout(function() {
                        targetInner1.setAttribute("fill", "#ffffff");
                        targetInner2.setAttribute("fill", "#ff4040");
                    }, 400);
                }
            }, 12);
        }

        function toggleFire() {
            if (firing) {
                firing = false;
                flash.setAttribute("opacity", "0");
                clearInterval(fireTimer);
                fireTimer = null;
            } else {
                firing = true;
                flash.setAttribute("opacity", "1");
                shootBullet();
                fireTimer = setInterval(shootBullet, 120);
            }
        }

        stickman.addEventListener("click", toggleFire);
    </script>
</body>
</html>
