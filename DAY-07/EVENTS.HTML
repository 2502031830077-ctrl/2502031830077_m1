<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS event handling</title>
</head>
<body>
    Select Product : <select id="product" name="">
        <option value="45000">Ac</option>
        <option value="55000">Laptop</option>
        <option value="65000">Smartphone</option>
        <option value="75000">Tablet</option>
    </select>
<br><br>
    Net Price : <input type="text" id="netprice"><br><br>
    Quantity : <input type="text" id="quantity"><br><br>
    Total Amount : <input type="text" id="amount"><br><br>
    <script>
        var product = document.getElementById("product");
        var netprice = document.getElementById("netprice");
        var quantity = document.getElementById("quantity");
        var amount = document.getElementById("amount");

        product.addEventListener("change", function() {
            netprice.value = this.value;
            calculateAmount();
        });

        quantity.addEventListener("input", calculateAmount);

        function calculateAmount() {
            var price = parseFloat(netprice.value) || 0;
            var qty = parseInt(quantity.value) || 0;
            amount.value = price * qty;
        }
        </script>
</body>
</html>
