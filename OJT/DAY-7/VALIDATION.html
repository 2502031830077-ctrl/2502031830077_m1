<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <form id="RegForm" method="post" name="RegForm" onsubmit="return validate()">
        <h2>Login Form</h2>
        <table>
            <tr>
                <td><label for="name">Name:</label></td>
                <td><input type="text" id="name" name="name"></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>
            <tr>
                <td><label for="phone">Phone:</label></td>
                <td><input type="text" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td><label for="what">Course:</label></td>
                <td>
                    <select id="what" name="what">
                        <option value="">Select a course</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="React">React</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password" name="password"></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align:center; padding-top:10px;">
                    <button type="submit">Submit</button>
                </td>
            </tr>
        </table>
    </form>
    <script>
        function validate() {
            var form1 = document.getElementById("RegForm");
            var name = form1.name.value.trim();
            var email = form1.email.value.trim();
            var phone = form1.phone.value.trim();
            var course = form1.what.value;
            var password = form1.password.value;
            var regemail = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
            var regphone = /^\d{10}$/;

            if (name === "") {
                window.alert("Please enter your Name.");
                return false;
            }
            if (email === "" || !regemail.test(email)) {
                window.alert("Please enter a valid e-mail address.");
                return false;
            }
            if (phone === "" || !regphone.test(phone)) {
                alert("Please enter a valid phone number.");
                return false;
            }
            if (course === "") {
                alert("Please select a course.");
                return false;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }
        }
    </script>
</body>
</html>
