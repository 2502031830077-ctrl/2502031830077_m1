<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight Club</title>
</head>
<body>
    <style>
        body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:linear-gradient(#91c6ff,#e6f7ff);font-family:sans-serif}
        .stage{width:800px;height:420px;background:linear-gradient(#e9f3ff,#d6ecff);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;perspective:1000px}
        .scene{width:700px;height:320px;position:relative;transform-style:preserve-3d}
        svg{width:100%;height:100%;overflow:visible}
        .man{transition:transform 400ms cubic-bezier(.2,.9,.3,1);transform-origin:center;}
        .sword{stroke:#444;stroke-width:6;stroke-linecap:round;transform-origin:12px 12px;transition:transform 120ms ease}
        .sword.leftSwing{transform:rotate(-65deg)}
        .sword.rightSwing{transform:rotate(65deg)}

        .gun{fill:#333}

        .hud{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,0.8);padding:6px 10px;border-radius:8px;font-weight:600;z-index:10;}
        .hint{position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);padding:6px 10px;border-radius:8px;font-size:13px;z-index:10;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .health-panel { position: absolute; top: 12px; width: 200px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
        .health-panel.left { left: 12px; }
        .health-panel.right { right: 12px; align-items: flex-end; }
        .health-name { font-weight: 900; font-size: 16px; color: #333; }
        .health-bar-container { width: 100%; height: 16px; background: #ddd; border-radius: 8px; overflow: hidden; border: 2px solid #333; }
        .health-bar { height: 100%; background: #2ecc71; transition: width 0.3s ease, background 0.3s ease; }
        .health-bar.danger { background: #e74c3c; }
        
        .floating-text {
            font-size: 24px; font-weight: 900; font-family: sans-serif;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }
        .controls button { background: #fff; border: 2px solid #ccc; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .controls button:hover { background: #f0f0f0; }
        .controls button.active { background: #333; color: #fff; border-color: #333; }

        .muzzle{fill:orangered;opacity:0.95}
    </style>

    <div class="stage">
        <div class="scene" id="scene" tabindex="0">
            <div class="health-panel left">
                <div class="health-name">Robot</div>
                <div class="health-bar-container"><div class="health-bar" id="hpLeft" style="width: 100%;"></div></div>
            </div>
            <div class="health-panel right">
                <div class="health-name">You</div>
                <div class="health-bar-container"><div class="health-bar" id="hpRight" style="width: 100%;"></div></div>
            </div>
            <div class="hud" id="hud">Strikes: <span id="count">0</span></div>
            <div class="hint" id="gameHint">Click the scene to approach & clash</div>
            <div class="controls" style="position:absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display:flex; gap:8px;">
                <button id="btnSword" class="active" onclick="setWeapon('sword')">Swords</button>
                <button id="btnGun" onclick="setWeapon('gun')">Guns</button>
                <button id="btnBeam" onclick="setWeapon('beam')">Lasers</button>
            </div>
            <svg viewBox="0 0 700 320" preserveAspectRatio="xMidYMid meet">
                <!-- ground shadow -->
                <ellipse cx="350" cy="300" rx="260" ry="28" fill="rgba(0,0,0,0.06)" />

                <!-- Left stickman group -->
                <g id="leftMan" class="man left" transform="translate(120,140)">
                    <text x="0" y="-85" text-anchor="middle" font-size="20" font-family="sans-serif" font-weight="900" fill="#222">Robot</text>
                    <!-- Top Hat -->
                    <path d="M-12,-52 L12,-52 L10,-70 L-10,-70 Z" fill="#333"/>
                    <rect x="-20" y="-54" width="40" height="4" fill="#222" rx="2"/>
                    <circle cx="0" cy="-40" r="16" fill="#ffe0bd" stroke="#d9bfa3" stroke-width="1"/>
                    
                    <!-- Blue Shirt -->
                    <line x1="0" y1="-20" x2="0" y2="28" stroke="#3498db" stroke-width="14" stroke-linecap="round" />
                    <line x1="0" y1="-24" x2="0" y2="30" stroke="#222" stroke-width="4" />
                    
                    <!-- Sleeves / Arms -->
                    <line x1="0" y1="0" x2="-14" y2="5" stroke="#3498db" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="0" x2="18" y2="3" stroke="#3498db" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="0" x2="-28" y2="10" stroke="#222" stroke-width="4" />
                    <line x1="0" y1="0" x2="36" y2="6" stroke="#222" stroke-width="4" />
                    
                    <!-- Pants / Legs -->
                    <line x1="0" y1="30" x2="-5" y2="50" stroke="#2c3e50" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="30" x2="10" y2="50" stroke="#2c3e50" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="30" x2="-10" y2="70" stroke="#222" stroke-width="4" />
                    <line x1="0" y1="30" x2="20" y2="70" stroke="#222" stroke-width="4" />

                    <!-- sword (as a group so we can pivot) -->
                    <g id="leftWeapon" transform="translate(36,6)">
                        <line x1="0" y1="0" x2="56" y2="-6" class="sword" id="leftSword" stroke-linecap="round" />
                        <rect x="-6" y="-4" width="12" height="10" fill="#8b5a2b" stroke="#5a3a20" stroke-width="1" />
                    </g>
                </g>

                <!-- Right stickman group -->
                <g id="rightMan" class="man right" transform="translate(580,140)">
                    <text x="0" y="-85" text-anchor="middle" font-size="20" font-family="sans-serif" font-weight="900" fill="#222">You</text>
                    <!-- Spiky Hair -->
                    <path d="M-14,-46 L-10,-60 L-4,-48 L0,-62 L6,-48 L12,-58 L14,-46 Z" fill="#8b4513"/>
                    <circle cx="0" cy="-40" r="16" fill="#ffd6b3" stroke="#d9bfa3" stroke-width="1"/>
                    
                    <!-- Red Shirt -->
                    <line x1="0" y1="-20" x2="0" y2="28" stroke="#e74c3c" stroke-width="14" stroke-linecap="round" />
                    <line x1="0" y1="-24" x2="0" y2="30" stroke="#222" stroke-width="4" />
                    
                    <!-- Sleeves / Arms -->
                    <line x1="0" y1="0" x2="14" y2="5" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="0" x2="-18" y2="3" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="0" x2="28" y2="10" stroke="#222" stroke-width="4" />
                    <line x1="0" y1="0" x2="-36" y2="6" stroke="#222" stroke-width="4" />
                    
                    <!-- Pants / Legs -->
                    <line x1="0" y1="30" x2="5" y2="50" stroke="#2c3e50" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="30" x2="-10" y2="50" stroke="#2c3e50" stroke-width="8" stroke-linecap="round" />
                    <line x1="0" y1="30" x2="10" y2="70" stroke="#222" stroke-width="4" />
                    <line x1="0" y1="30" x2="-20" y2="70" stroke="#222" stroke-width="4" />

                    <g id="rightWeapon" transform="translate(-36,6)">
                        <line x1="0" y1="0" x2="-56" y2="-6" class="sword" id="rightSword" stroke-linecap="round" />
                        <rect x="-6" y="-4" width="12" height="10" fill="#8b5a2b" stroke="#5a3a20" stroke-width="1" />
                    </g>
                </g>

                <!-- center clash sparks (hidden until used) -->
                <g id="sparks" style="display:none">
                    <circle cx="350" cy="140" r="6" fill="gold" opacity="0.9" />
                    <circle cx="362" cy="132" r="4" fill="orange" opacity="0.9" />
                </g>
            </svg>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const leftMan = document.getElementById('leftMan');
        const rightMan = document.getElementById('rightMan');
        let leftSword = document.getElementById('leftSword');
        let rightSword = document.getElementById('rightSword');
        const leftWeapon = document.getElementById('leftWeapon');
        const rightWeapon = document.getElementById('rightWeapon');
        const countEl = document.getElementById('count');
        const sparks = document.getElementById('sparks');
        const hpLeftEl = document.getElementById('hpLeft');
        const hpRightEl = document.getElementById('hpRight');
        const hintEl = document.getElementById('gameHint');

        let strikes = 0;
        let approaching = false;
        let armedWithGuns = false;
        let armedWithBeams = false;
        let isGameOver = false;
        let hpLeft = 100;
        let hpRight = 100;
        let matchCount = 1;

        function updateHealthBars() {
            hpLeftEl.style.width = hpLeft + '%';
            hpRightEl.style.width = hpRight + '%';
            if (hpLeft <= 30) hpLeftEl.classList.add('danger'); else hpLeftEl.classList.remove('danger');
            if (hpRight <= 30) hpRightEl.classList.add('danger'); else hpRightEl.classList.remove('danger');
        }

        function showFloatingText(x, y, text, color) {
            const ns = 'http://www.w3.org/2000/svg';
            const txt = document.createElementNS(ns, 'text');
            txt.setAttribute('x', x);
            txt.setAttribute('y', y);
            txt.setAttribute('fill', color);
            txt.setAttribute('class', 'floating-text');
            txt.setAttribute('text-anchor', 'middle');
            txt.textContent = text;
            scene.querySelector('svg').appendChild(txt);
            setTimeout(() => txt.remove(), 800);
        }

        function combatRound(damage) {
            if (isGameOver) return;
            
            // Alternating wins: Odd matchCount = Robot wins, Even matchCount = You win
            let robotWins = (matchCount % 2 !== 0);
            let leftHits = robotWins ? true : false;
            let rightHits = robotWins ? false : true;
            
            setTimeout(() => {
                let leftX = armedWithGuns ? 260 : 280;
                let rightX = armedWithGuns ? 440 : 420;

                if (leftHits) {
                    hpRight = Math.max(0, hpRight - damage);
                    showFloatingText(rightX, 50, "HIT!", "#e74c3c");
                } else {
                    showFloatingText(rightX, 50, "MISS", "#7f8c8d");
                }
                
                if (rightHits) {
                    hpLeft = Math.max(0, hpLeft - damage);
                    showFloatingText(leftX, 50, "HIT!", "#e74c3c");
                } else {
                    showFloatingText(leftX, 50, "MISS", "#7f8c8d");
                }
                
                updateHealthBars();
                checkGameOver();
            }, 100);
        }

        function checkGameOver() {
            if (hpLeft <= 0 || hpRight <= 0) {
                isGameOver = true;
                if (hpLeft <= 0) {
                    leftMan.style.transition = 'transform 0.5s ease';
                    leftMan.style.transform = 'translate(120px, 200px) rotate(-90deg)';
                }
                if (hpRight <= 0) {
                    rightMan.style.transition = 'transform 0.5s ease';
                    rightMan.style.transform = 'translate(580px, 200px) rotate(90deg)';
                }
                hintEl.textContent = 'GAME OVER! Click reset to play again.';
                
                const controls = document.querySelector('.controls');
                if(!document.getElementById('btnReset')) {
                    const resetBtn = document.createElement('button');
                    resetBtn.id = 'btnReset';
                    resetBtn.textContent = 'Reset Match';
                    resetBtn.style.backgroundColor = '#e74c3c';
                    resetBtn.style.color = '#fff';
                    resetBtn.onclick = resetMatch;
                    controls.appendChild(resetBtn);
                }
            }
        }

        function resetMatch() {
            matchCount++;
            hpLeft = 100;
            hpRight = 100;
            isGameOver = false;
            strikes = 0;
            countEl.textContent = strikes;
            updateHealthBars();
            
            leftMan.style.transition = '';
            rightMan.style.transition = '';
            
            const resetBtn = document.getElementById('btnReset');
            if(resetBtn) resetBtn.remove();
            
            setWeapon(armedWithBeams ? 'beam' : armedWithGuns ? 'gun' : 'sword');
        }

        function approachAndClash(){
            if(approaching) return; // debounce while animating
            approaching = true;

            // Move SVG groups to the stage center for one clash
            leftMan.setAttribute('transform','translate(280,140)');
            rightMan.setAttribute('transform','translate(420,140)');

            clash();

            setTimeout(()=>{ approaching = false; }, 260);
        }

        function clash(){
            if(armedWithGuns) return gunFire();

            // swing swords once per click
            leftSword.classList.add('leftSwing');
            rightSword.classList.add('rightSwing');
            sparks.style.display = 'block';

            setTimeout(()=>{
                leftSword.classList.remove('leftSwing');
                rightSword.classList.remove('rightSwing');
                sparks.style.display = 'none';
            },140);

            strikes++;
            countEl.textContent = strikes;
            combatRound(10);
        }

        function setWeapon(type){
            armedWithGuns = (type === 'gun' || type === 'beam');
            armedWithBeams = (type === 'beam');

            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            if(type === 'sword') document.getElementById('btnSword').classList.add('active');
            if(type === 'gun') document.getElementById('btnGun').classList.add('active');
            if(type === 'beam') document.getElementById('btnBeam').classList.add('active');

            if (type === 'sword') {
                leftWeapon.innerHTML = `
                    <line x1="0" y1="0" x2="56" y2="-6" class="sword" id="leftSword" stroke-linecap="round" />
                    <rect x="-6" y="-4" width="12" height="10" fill="#8b5a2b" stroke="#5a3a20" stroke-width="1" />
                `;
                rightWeapon.innerHTML = `
                    <line x1="0" y1="0" x2="-56" y2="-6" class="sword" id="rightSword" stroke-linecap="round" />
                    <rect x="-6" y="-4" width="12" height="10" fill="#8b5a2b" stroke="#5a3a20" stroke-width="1" />
                `;
                if(!isGameOver) hintEl.textContent = 'They got swords — click to clash!';
                leftSword = document.getElementById('leftSword');
                rightSword = document.getElementById('rightSword');
                leftMan.setAttribute('transform','translate(120,140)');
                rightMan.setAttribute('transform','translate(580,140)');
            } else if (type === 'gun') {
                leftWeapon.innerHTML = `
                    <rect x="0" y="-8" width="36" height="12" class="gun" rx="2" />
                    <rect x="34" y="-4" width="18" height="4" fill="#222" rx="2" />
                `;
                rightWeapon.innerHTML = `
                    <rect x="-36" y="-8" width="36" height="12" class="gun" rx="2" />
                    <rect x="-52" y="-4" width="18" height="4" fill="#222" rx="2" />
                `;
                if(!isGameOver) hintEl.textContent = 'They got guns — click to fire!';
                leftMan.setAttribute('transform','translate(260,140)');
                rightMan.setAttribute('transform','translate(440,140)');
            } else if (type === 'beam') {
                leftWeapon.innerHTML = `
                    <rect x="-6" y="-6" width="20" height="12" fill="#555" rx="2" />
                    <rect x="14" y="-4" width="10" height="8" fill="#111" />
                `;
                rightWeapon.innerHTML = `
                    <rect x="-14" y="-6" width="20" height="12" fill="#555" rx="2" />
                    <rect x="-24" y="-4" width="10" height="8" fill="#111" />
                `;
                if(!isGameOver) hintEl.textContent = 'They got laser beams — click to fire!';
                leftMan.setAttribute('transform','translate(260,140)');
                rightMan.setAttribute('transform','translate(440,140)');
            }
        }

        function gunFire(){
            // create muzzle flashes for both weapons
            createMuzzle(leftWeapon, 48, -2);
            createMuzzle(rightWeapon, -54, -2);
            // small recoil
            leftMan.style.transform = 'translate(260px, 140px) translateX(-40px) translateZ(20px) rotateY(-8deg) translateY(-6px)';
            rightMan.style.transform = 'translate(440px, 140px) translateX(40px) translateZ(20px) rotateY(8deg) translateY(-6px)';
            setTimeout(()=>{
                leftMan.style.transform = '';
                rightMan.style.transform = '';
            },160);

            strikes++;
            countEl.textContent = strikes;
            combatRound(15);
        }

        function beamFire(){
            const ns = 'http://www.w3.org/2000/svg';
            // create huge laser beams
            const leftLaser = document.createElementNS(ns, 'line');
            leftLaser.setAttribute('x1', '24');
            leftLaser.setAttribute('y1', '0');
            leftLaser.setAttribute('x2', '800');
            leftLaser.setAttribute('y2', '0');
            leftLaser.setAttribute('stroke', '#0ff');
            leftLaser.setAttribute('stroke-width', '16');
            leftLaser.setAttribute('stroke-linecap', 'round');
            leftLaser.setAttribute('opacity', '0.9');
            leftWeapon.appendChild(leftLaser);

            const rightLaser = document.createElementNS(ns, 'line');
            rightLaser.setAttribute('x1', '-24');
            rightLaser.setAttribute('y1', '0');
            rightLaser.setAttribute('x2', '-800');
            rightLaser.setAttribute('y2', '0');
            rightLaser.setAttribute('stroke', '#f0f');
            rightLaser.setAttribute('stroke-width', '16');
            rightLaser.setAttribute('stroke-linecap', 'round');
            rightLaser.setAttribute('opacity', '0.9');
            rightWeapon.appendChild(rightLaser);

            // strong recoil
            leftMan.style.transform = 'translate(260px, 140px) translateX(-60px) translateZ(30px) rotateY(-15deg) translateY(-10px)';
            rightMan.style.transform = 'translate(440px, 140px) translateX(60px) translateZ(30px) rotateY(15deg) translateY(-10px)';
            
            setTimeout(()=>{
                leftLaser.remove();
                rightLaser.remove();
                leftMan.style.transform = '';
                rightMan.style.transform = '';
            }, 250);

            strikes++;
            countEl.textContent = strikes;
            combatRound(25);
        }

        function createMuzzle(parent, x, y){
            const ns = 'http://www.w3.org/2000/svg';
            const svg = parent.ownerSVGElement;
            const flash = document.createElementNS(ns,'circle');
            flash.setAttribute('cx', x);
            flash.setAttribute('cy', y);
            flash.setAttribute('r', 6);
            flash.setAttribute('class','muzzle');
            parent.appendChild(flash);
            setTimeout(()=> flash.remove(), 120 + Math.random()*80);
        }

        // Click handler on scene
        scene.addEventListener('click', (e)=>{
            if (isGameOver) return;
            if(armedWithBeams){
                beamFire();
            } else if(armedWithGuns){
                gunFire();
            } else {
                approachAndClash();
            }
        });

        // keyboard accessibility: Space to trigger
        scene.addEventListener('keydown', (e)=>{ if(e.code==='Space'){ scene.click(); e.preventDefault(); }});
    </script>
</body>
</html>
