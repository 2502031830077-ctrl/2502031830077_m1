<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Map Example</title>
    <style>
       
        iframe {
            width: 100%;
            height: 450px;
            border: 2px solid #333;

<body>
